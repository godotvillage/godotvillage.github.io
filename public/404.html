<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Godot新手村</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0F172A;
      color: #F8FAFC;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .box {
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #F8FAFC;
    }
    p {
      font-size: 15px;
      color: #94A3B8;
      line-height: 1.6;
    }
    .countdown {
      display: inline-block;
      margin-top: 24px;
      font-size: 13px;
      color: #64748B;
    }
    .countdown span {
      color: #60A5FA;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Godot新手村群官网已经重构</h1>
    <p id="msg">3 秒后前往新官网首页</p>
    <p class="countdown"><span id="sec">3</span> 秒</p>
  </div>

  <script>
    var n = 3;
    var el = document.getElementById('sec');
    var t = setInterval(function () {
      n--;
      if (n <= 0) {
        clearInterval(t);
        location.replace('/#/');
      } else {
        el.textContent = n;
      }
    }, 1000);
  </script>
</body>
</html>
